<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treact</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/41cda13e3c.js" crossorigin="anonymous"></script>
</head>
<body>
    <section class="landing">
        <div class="row nav__row">
            <div class="nav">
                <div class="nav__logo">
                    <figure>
                        <img class="nav__logo--img" src="./assets/logo.svg" alt="">
                    </figure>
                    <h1 class="nav__logo--title">Treact</h1>
                </div>
                <ul class="nav__links">
                    <li><a href="#" class="nav__link link__hover-effect
                    link__hover-effect--purple">About</a></li>
                    <li><a href="#" class="nav__link link__hover-effect
                    link__hover-effect--purple">Blog</a></li>
                    <li><a href="#" class="nav__link link__hover-effect
                    link__hover-effect--purple">Pricing</a></li>
                    <li><a href="#" class="nav__link link__hover-effect
                    link__hover-effect--purple">Contact Us</a></li>
                    <li><a href="#" class="nav__link nav__link--login link__hover-effect
                    link__hover-effect--purple">Login</a></li>
                    <li><a href="#" class="nav__link--button">Sign Up</a></li>
                </ul>
            </div>
         </div>
    </section>
    <section id="header">
        <div class="container">
            <div class="row">
                <div class="header">
                    <div class="header__description">
                        <h1 class="header__description--title">Beautiful React Templates <span class="purple-text">for you.</span></h1>
                        <p class="header__description--para">Our templates are easy to setup, understand and customize. Fully modular components with a variety of pages and components</p>
                        <div class="header__email">
                            <input type="email" class="header__email--input"
                            placeholder="Your E-mail Address">
                            <button class="header__email--btn">Get Started</button>
                        </div>
                        <figure class="trusted-customers">
                            <p class="trusted-customers__title">OUR TRUSTED CUSTOMERS</p>
                            <img class="trusted-customers__img" src="./assets/trusted customers.png" alt="">
                        </figure>
                    </div>
                    <figure class=header__img>
                        <img src="./assets/header--img.svg" alt="">
                    </figure>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
